<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Expenses"/>
<title>Expense Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F7F8FC;
  --card:#FFFFFF;
  --card2:#F0F2F8;
  --bdr:rgba(99,102,241,0.12);
  --txt:#1E1E2E;
  --mut:#8B8FA8;
  --pri:#6366F1;
  --acc:#6366F1;
  --err:#EF4444;
  --inp:#F0F2F8;
  --shadow:rgba(99,102,241,0.08);
  --room-color:#0EA5E9;
  --personal-color:#6366F1;
  --invest-color:#10B981;
  --nav-bg:#FFFFFF;
  --fab-bg:linear-gradient(135deg,#6366F1,#818CF8);
  --fab-shadow:rgba(99,102,241,0.4);
  --header-border:rgba(99,102,241,0.1);
}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* HEADER */
.hdr{position:sticky;top:0;z-index:99;background:var(--bg);border-bottom:1px solid var(--header-border);padding:14px 16px;backdrop-filter:blur(10px)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.htitle{font-size:17px;font-weight:800;background:linear-gradient(135deg,#6366F1,#818CF8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.3px}
.hright{display:flex;gap:6px}
.sel{background:var(--card);color:var(--txt);border:1px solid var(--bdr);border-radius:9px;padding:6px 9px;font-size:12px;outline:none;font-family:inherit;font-weight:600;box-shadow:0 1px 4px var(--shadow)}

/* SUMMARY CARDS */
.sumrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.scard{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:9px 10px;text-align:center;box-shadow:0 1px 6px var(--shadow)}
.slbl{font-size:8px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);font-weight:700}
.samt{font-size:12px;font-weight:800;margin-top:3px}
main{flex:1;padding:14px 14px 90px;overflow-y:auto}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;z-index:99}
.bnav-in{width:100%;max-width:480px;background:var(--nav-bg);border-top:1px solid var(--bdr);box-shadow:0 -4px 20px rgba(99,102,241,0.08)}
.navrow{display:flex;height:62px;align-items:center;position:relative}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;font-family:inherit;position:relative;height:100%}
.nb.on::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:30px;height:3px;border-radius:0 0 4px 4px;background:currentColor}
.ni{font-size:18px}
.nl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}

/* FAB */
.fab{width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;font-size:28px;display:flex;align-items:center;justify-content:center;background:var(--fab-bg);color:#fff;box-shadow:0 6px 24px var(--fab-shadow);transition:all .2s;flex-shrink:0;margin:0 8px;position:relative;top:-12px;font-weight:900}
.fab:active{transform:scale(.92)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:15px;padding:15px;margin-bottom:11px;box-shadow:0 2px 10px var(--shadow)}
.sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--mut);margin-bottom:10px}
.fl{font-size:12px;font-weight:600;color:var(--mut);margin-bottom:7px}

/* CATEGORY CHIPS */
.cwrap{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px}
.cb{padding:8px 13px;border-radius:20px;font-size:12px;cursor:pointer;border:1.5px solid var(--bdr);background:var(--card2);color:var(--mut);font-family:inherit;white-space:nowrap;transition:all .15s;font-weight:500}
.cb:active{transform:scale(.96)}

/* AMOUNT INPUT */
.awrap{position:relative;margin-bottom:14px}
.asym{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:22px;color:var(--mut);font-weight:700}
.ain{width:100%;background:var(--inp);border:2px solid var(--bdr);border-radius:13px;padding:15px 14px 15px 36px;font-size:28px;font-weight:800;color:var(--txt);outline:none;font-family:inherit;transition:border-color .2s}
.ain:focus{border-color:var(--pri);background:#fff}

/* TEXT INPUTS */
.tin{width:100%;background:var(--inp);border:1.5px solid var(--bdr);border-radius:11px;padding:11px 13px;font-size:13px;color:var(--txt);outline:none;margin-bottom:14px;font-family:inherit;color-scheme:light;transition:border-color .2s}
.tin:focus{border-color:var(--pri);background:#fff}

/* SAVE BUTTON */
.sbtn{width:100%;padding:15px;border-radius:13px;font-size:14px;font-weight:800;border:none;cursor:pointer;color:#fff;font-family:inherit;margin-top:4px;transition:all .3s;position:relative;overflow:hidden;background:linear-gradient(135deg,#6366F1,#818CF8);box-shadow:0 4px 16px rgba(99,102,241,0.35)}
.sbtn:active{transform:scale(.98)}
.sbtn.saved{animation:indigoGlow .8s ease-out}
@keyframes indigoGlow{
  0%{box-shadow:0 0 0 0 rgba(99,102,241,0.8)}
  30%{box-shadow:0 0 30px 15px rgba(99,102,241,0.4)}
  60%{box-shadow:0 0 60px 25px rgba(99,102,241,0.2)}
  100%{box-shadow:0 0 0 0 rgba(99,102,241,0)}}
.sbtn.saved::after{content:'✓ Saved!';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;background:linear-gradient(135deg,#6366F1,#818CF8);color:#fff;animation:fadeCheck .8s ease-out forwards}
@keyframes fadeCheck{0%{opacity:0;transform:scale(.8)}20%{opacity:1;transform:scale(1.05)}80%{opacity:1}100%{opacity:0}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(30,30,46,.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:20px 16px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;animation:slideUp .3s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--bdr);border-radius:2px;margin:0 auto 16px}

/* VTABS */
.vtabs{display:flex;gap:7px;margin-bottom:13px}
.vtb{padding:8px 16px;border-radius:10px;border:1.5px solid;font-size:12px;font-weight:700;cursor:pointer;background:var(--card);font-family:inherit;transition:all .15s}

/* LIST ITEMS */
.dlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);border-bottom:1px solid var(--bdr);padding-bottom:6px;margin:10px 0 8px}
.ei{background:var(--card);border:1px solid var(--bdr);border-radius:13px;padding:11px 12px;display:flex;align-items:center;gap:10px;margin-bottom:8px;transition:all .2s;box-shadow:0 1px 5px var(--shadow)}
.eico{width:40px;height:40px;border-radius:12px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.einfo{flex:1;min-width:0}
.ename{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.esub{font-size:11px;color:var(--mut);margin-top:2px}
.er{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.eamt{font-weight:800;font-size:13px}
.abrow{display:flex;gap:4px}
.abtn{background:var(--card2);border:1px solid var(--bdr);border-radius:7px;cursor:pointer;font-size:12px;padding:4px 7px}
.empty{text-align:center;padding:50px 0;color:var(--mut);font-size:13px}
.csvbtn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(99,102,241,.08);border:1.5px solid rgba(99,102,241,.2);color:#6366F1;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:11px;font-family:inherit}

/* PROGRESS BAR */
.pbw{border-radius:999px;overflow:hidden;background:var(--card2)}
.pbr{border-radius:999px;transition:width .6s ease}

/* BUDGET ALERTS */
.budget-warning{background:rgba(239,68,68,.07);border:1.5px solid rgba(239,68,68,.2);border-radius:11px;padding:10px 13px;margin-top:9px;font-size:12px;color:#EF4444;font-weight:600}
.budget-ok{background:rgba(16,185,129,.07);border:1.5px solid rgba(16,185,129,.2);border-radius:11px;padding:10px 13px;margin-top:9px;font-size:12px;color:#10B981;font-weight:600}

/* ROOM */
.ri{width:100%;background:var(--inp);border:1.5px solid var(--bdr);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--txt);outline:none;font-family:inherit;transition:border-color .2s}
.ri:focus{border-color:var(--room-color)}
.prow{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.pni{flex:1;background:var(--inp);border:1.5px solid var(--bdr);border-radius:10px;padding:9px 11px;font-size:12px;color:var(--txt);outline:none;font-family:inherit}
.ppw{position:relative}
.pps{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:12px}
.ppi{width:90px;background:var(--inp);border:1.5px solid var(--bdr);border-radius:10px;padding:9px 6px 9px 20px;font-size:12px;color:var(--txt);outline:none;font-family:inherit}
.pdelbtn{width:32px;height:32px;border-radius:9px;border:1.5px solid rgba(239,68,68,.25);background:rgba(239,68,68,.08);color:#EF4444;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.addprow{display:flex;gap:6px}
.addpin{flex:1;background:var(--inp);border:1.5px solid var(--bdr);border-radius:10px;padding:9px 11px;font-size:12px;color:var(--txt);outline:none;font-family:inherit}
.addpbtn{padding:9px 14px;background:rgba(14,165,233,.1);border:1.5px solid rgba(14,165,233,.25);color:#0EA5E9;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.splitcard{border:1.5px solid rgba(99,102,241,.15);border-radius:15px;padding:14px;background:rgba(99,102,241,.03);margin-bottom:11px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bdr)}
.srow:last-child{border:none}
.overcard{border:1.5px solid rgba(239,68,68,.2);border-radius:13px;padding:13px;background:rgba(239,68,68,.05);margin-top:10px}
.okcard{border:1.5px solid rgba(16,185,129,.2);border-radius:13px;padding:13px;background:rgba(16,185,129,.05);margin-top:10px}

/* INSIGHTS */
.snav{display:flex;background:var(--card2);border:1.5px solid var(--bdr);border-radius:12px;padding:4px;gap:4px;margin-bottom:12px}
.snb{flex:1;padding:8px 2px;font-size:11px;font-weight:600;border-radius:9px;border:none;cursor:pointer;background:none;color:var(--mut);font-family:inherit}
.snb.on{background:#fff;color:#6366F1;box-shadow:0 2px 8px var(--shadow)}
.hicrd{background:rgba(99,102,241,.06);border:1.5px solid rgba(99,102,241,.15);border-radius:15px;padding:14px;margin-bottom:11px}
.stgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:11px}
.stbox{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:10px;text-align:center;box-shadow:0 1px 5px var(--shadow)}
.remark-good{background:rgba(16,185,129,.06);border:1.5px solid rgba(16,185,129,.18);border-radius:14px;padding:13px;margin-bottom:9px}
.remark-bad{background:rgba(239,68,68,.06);border:1.5px solid rgba(239,68,68,.18);border-radius:14px;padding:13px;margin-bottom:9px}
.remark-neutral{background:var(--card);border:1.5px solid var(--bdr);border-radius:14px;padding:13px;margin-bottom:9px;box-shadow:0 1px 5px var(--shadow)}
.remark-icon{font-size:22px;margin-bottom:6px}
.remark-title{font-size:12px;font-weight:800;margin-bottom:4px}
.remark-txt{font-size:11px;color:var(--mut);line-height:1.6}
.donut-wrap{display:flex;align-items:center;gap:18px;margin-bottom:11px}
.donut-legend{display:flex;flex-direction:column;gap:7px;flex:1}
.legend-item{display:flex;align-items:center;gap:7px;font-size:11px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div id="app"></div>
<script>
var PFX='et6:';
function gls(k,d){try{var v=localStorage.getItem(PFX+k);return v?JSON.parse(v):d;}catch(e){return d;}}
function sls(k,v){try{localStorage.setItem(PFX+k,JSON.stringify(v));}catch(e){}}

var MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var MOF=['January','February','March','April','May','June','July','August','September','October','November','December'];
var FOOD=['food_outside','room_food'];
var MEALS=[{id:'breakfast',l:'Breakfast',i:'🌅'},{id:'lunch',l:'Lunch',i:'☀️'},{id:'dinner',l:'Dinner',i:'🌙'},{id:'snacks',l:'Snacks',i:'🍪'}];
var CATS={
  personal:[{id:'food_outside',l:'Food/Dining',i:'🍽️'},{id:'transport',l:'Transport',i:'🚗'},{id:'shopping',l:'Shopping',i:'🛍️'},{id:'entertainment',l:'Entertainment',i:'🎬'},{id:'health',l:'Health',i:'💊'},{id:'subscriptions',l:'Subscriptions',i:'📱'},{id:'personal_other',l:'Other',i:'👤'}],
  room:[{id:'rent',l:'Rent',i:'🏠'},{id:'electricity',l:'Electricity',i:'⚡'},{id:'water',l:'Water',i:'💧'},{id:'wifi',l:'WiFi',i:'📶'},{id:'maintenance',l:'Maintenance',i:'🔧'},{id:'groceries',l:'Groceries',i:'🛒'},{id:'cooking_gas',l:'Cooking Gas',i:'🔥'},{id:'room_food',l:'Food/Dining',i:'🍽️'},{id:'room_other',l:'Other',i:'🏡'}],
  investment:[{id:'mutual_fund',l:'Mutual Fund/SIP',i:'📈'},{id:'stocks',l:'Stocks',i:'📊'},{id:'etf',l:'ETF',i:'🌐'},{id:'fd',l:'Fixed Deposit',i:'🏦'},{id:'ppf',l:'PPF/NPS',i:'🛡️'},{id:'gold',l:'Gold/SGB',i:'🥇'},{id:'inv_other',l:'Other',i:'💼'}]
};
var ALL_CATS=CATS.personal.concat(CATS.room,CATS.investment);
function gc(id){return ALL_CATS.find(function(c){return c.id===id;})||{id:id,l:id,i:'💸'};}
function fmt(n){return new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR',maximumFractionDigits:0}).format(n||0);}
function fmtShort(n){if(n>=100000)return '₹'+(n/100000).toFixed(1)+'L';if(n>=1000)return '₹'+(n/1000).toFixed(1)+'K';return fmt(n);}

function getTC(){return {room:'#0EA5E9',personal:'#6366F1',investment:'#10B981'};}

var S={
  expenses:gls('exp',[]),rb:gls('rb',{rent:'',total:''}),partners:gls('prt',[]),
  editId:null,tab:'personal',month:new Date().getMonth(),year:new Date().getFullYear(),
  pv:'list',iv:'list',rv:'budget',insv:'overview',
  showModal:false,modalType:'personal',
  fa:'',fc:'',fm:'',fn:'',fd:new Date().toISOString().split('T')[0]
};
function ss(p){Object.keys(p).forEach(function(k){S[k]=p[k];});render();}
function saveExp(v){S.expenses=v;sls('exp',v);}
function saveRb(v){S.rb=v;sls('rb',v);}
function savePrt(v){S.partners=v;sls('prt',v);}

function h(tag,cls,style){var el=document.createElement(tag);if(cls)el.className=cls;if(style)Object.assign(el.style,style);return el;}
function t(txt){return document.createTextNode(String(txt));}
function ap(parent){var args=Array.prototype.slice.call(arguments,1);args.forEach(function(c){if(c!=null&&c!==false)parent.appendChild(typeof c==='string'||typeof c==='number'?t(c):c);});return parent;}

function progBar(val,max,color,ht){
  ht=ht||7;
  var pct=max>0?Math.min((val/max)*100,100):0;
  var over=val>max&&max>0;
  var wrap=h('div','pbw');wrap.style.height=ht+'px';
  var bar=h('div','pbr');bar.style.cssText='width:'+pct+'%;background:'+(over?'#EF4444':color)+';height:'+ht+'px';
  wrap.appendChild(bar);return wrap;
}

function csvExport(exps,label){
  var rows=exps.map(function(e){return[e.date,e.type,gc(e.category).l,e.meal||'',e.amount,e.note||''].map(function(v){return'"'+String(v).replace(/"/g,'""')+'"';}).join(',');});
  var csv=['Date,Type,Category,Meal,Amount,Note'].concat(rows).join('\n');
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=label+'-expenses.csv';a.click();
}

function donutChart(segments,size){
  size=size||120;
  var total=segments.reduce(function(s,seg){return s+seg.value;},0);
  if(total===0){var emp=h('div');emp.style.cssText='width:'+size+'px;height:'+size+'px;border-radius:50%;background:var(--card2);flex-shrink:0';return emp;}
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',size);svg.setAttribute('height',size);svg.setAttribute('viewBox','0 0 '+size+' '+size);
  var cx=size/2,cy=size/2,r=size/2-8,inner=r*0.55;
  var startAngle=-Math.PI/2;
  segments.forEach(function(seg){
    if(seg.value===0)return;
    var angle=(seg.value/total)*Math.PI*2;
    var endAngle=startAngle+angle;
    var x1=cx+r*Math.cos(startAngle),y1=cy+r*Math.sin(startAngle);
    var x2=cx+r*Math.cos(endAngle),y2=cy+r*Math.sin(endAngle);
    var ix1=cx+inner*Math.cos(startAngle),iy1=cy+inner*Math.sin(startAngle);
    var ix2=cx+inner*Math.cos(endAngle),iy2=cy+inner*Math.sin(endAngle);
    var large=angle>Math.PI?1:0;
    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M '+ix1+' '+iy1+' L '+x1+' '+y1+' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2+' L '+ix2+' '+iy2+' A '+inner+' '+inner+' 0 '+large+' 0 '+ix1+' '+iy1+' Z');
    path.setAttribute('fill',seg.color);
    svg.appendChild(path);
    startAngle=endAngle;
  });
  return svg;
}

function simpleBar(data,keys,colors,ht){
  ht=ht||80;
  var max=Math.max.apply(null,data.map(function(d){return keys.reduce(function(s,k){return s+(d[k]||0);},0);}));
  if(max===0)max=1;
  var wrap=h('div');wrap.style.cssText='display:flex;align-items:flex-end;gap:4px;height:'+ht+'px;padding:0 2px;margin-bottom:7px';
  data.forEach(function(d){
    var total=keys.reduce(function(s,k){return s+(d[k]||0);},0);
    var th=(total/max)*(ht-18);
    var col=h('div');col.style.cssText='display:flex;flex-direction:column;align-items:center;flex:1;gap:2px;justify-content:flex-end;height:100%';
    var vlbl=h('div');vlbl.style.cssText='font-size:7px;color:var(--mut);text-align:center;overflow:hidden;max-width:100%;white-space:nowrap';
    vlbl.textContent=total>0?fmtShort(total):'';
    var bwrap=h('div');bwrap.style.cssText='width:100%;display:flex;flex-direction:column;justify-content:flex-end;border-radius:5px 5px 0 0;overflow:hidden;height:'+Math.max(th,1)+'px';
    keys.forEach(function(k,i){
      var seg=h('div');seg.style.cssText='width:100%;height:'+((d[k]||0)/max*(ht-18))+'px;background:'+colors[i]+';flex-shrink:0';
      ap(bwrap,seg);
    });
    var lbl=h('div');lbl.style.cssText='font-size:8px;color:var(--mut);text-align:center;font-weight:600';lbl.textContent=d.label||'';
    ap(col,vlbl,bwrap,lbl);ap(wrap,col);
  });
  return wrap;
}

function generateRemarks(expenses,month,year){
  var remarks=[];
  var fil=expenses.filter(function(e){var d=new Date(e.date);return d.getMonth()===month&&d.getFullYear()===year;});
  var prevM=new Date(year,month-1,1);
  var filPrev=expenses.filter(function(e){var d=new Date(e.date);return d.getMonth()===prevM.getMonth()&&d.getFullYear()===prevM.getFullYear();});
  var cur={room:0,personal:0,invest:0,total:0};
  fil.forEach(function(e){if(e.type==='room')cur.room+=e.amount;else if(e.type==='personal')cur.personal+=e.amount;else cur.invest+=e.amount;});
  cur.total=cur.room+cur.personal+cur.invest;
  var curSpend=cur.room+cur.personal;
  var prv={room:0,personal:0,invest:0,total:0};
  filPrev.forEach(function(e){if(e.type==='room')prv.room+=e.amount;else if(e.type==='personal')prv.personal+=e.amount;else prv.invest+=e.amount;});
  prv.total=prv.room+prv.personal+prv.invest;
  var prvSpend=prv.room+prv.personal;
  var now=new Date();var today=new Date(year,month,now.getDate());
  var thisWeekStart=new Date(today);thisWeekStart.setDate(today.getDate()-today.getDay());
  var lastWeekStart=new Date(thisWeekStart);lastWeekStart.setDate(thisWeekStart.getDate()-7);
  var lastWeekEnd=new Date(thisWeekStart);lastWeekEnd.setDate(thisWeekStart.getDate()-1);
  var thisWeekSpend=0,lastWeekSpend=0;
  expenses.forEach(function(e){
    var d=new Date(e.date);
    if(e.type!=='investment'){
      if(d>=thisWeekStart&&d<=today)thisWeekSpend+=e.amount;
      if(d>=lastWeekStart&&d<=lastWeekEnd)lastWeekSpend+=e.amount;
    }
  });
  if(cur.invest>0){var invPct=Math.round((cur.invest/cur.total)*100);remarks.push({type:'good',icon:'📈',title:'Great job investing!',txt:'You invested '+fmt(cur.invest)+' this month — '+invPct+'% of your total. Compound interest is working for you.'});}
  if(prvSpend>0&&curSpend>0){var momDelta=curSpend-prvSpend;var momPct=Math.abs(Math.round((momDelta/prvSpend)*100));if(momDelta>0){remarks.push({type:'bad',icon:'⚠️',title:'Spending up vs last month',txt:'You spent '+fmt(momDelta)+' more ('+momPct+'%) than '+MO[prevM.getMonth()]+'. Review your biggest categories.'});}else if(momDelta<0){remarks.push({type:'good',icon:'🎉',title:'Spending down vs last month!',txt:'You saved '+fmt(Math.abs(momDelta))+' ('+momPct+'%) compared to '+MO[prevM.getMonth()]+'. Excellent discipline!']);}}
  if(lastWeekSpend>0&&thisWeekSpend>0){var wkDelta=thisWeekSpend-lastWeekSpend;var wkPct=Math.abs(Math.round((wkDelta/lastWeekSpend)*100));if(wkDelta>0){remarks.push({type:'bad',icon:'📊',title:'This week spending higher',txt:'This week you spent '+fmt(wkDelta)+' more ('+wkPct+'%) vs last week.'});}else{remarks.push({type:'good',icon:'✅',title:'This week looks good!',txt:'Spending is down '+fmt(Math.abs(wkDelta))+' ('+wkPct+'%) vs last week. On track!'});}}
  var bTotal=Number(S.rb.total)||0;
  if(bTotal>0&&cur.room>0){if(cur.room>bTotal){remarks.push({type:'bad',icon:'🏠',title:'Room budget exceeded!',txt:'Room expenses '+fmt(cur.room)+' exceeded budget of '+fmt(bTotal)+' by '+fmt(cur.room-bTotal)+'.'});}else{remarks.push({type:'good',icon:'🏠',title:'Room budget on track',txt:'Room spending '+fmt(cur.room)+' is within your '+fmt(bTotal)+' budget. '+fmt(bTotal-cur.room)+' remaining!'});}}
  var days=new Date(year,month+1,0).getDate();var daysPassed=Math.min(now.getDate(),days);
  var dailyAvg=daysPassed>0?Math.round(curSpend/daysPassed):0;
  var projectedMonth=dailyAvg*days;
  if(dailyAvg>0&&daysPassed<days-3){remarks.push({type:'neutral',icon:'🔮',title:'Month-end projection',txt:'At '+fmt(dailyAvg)+'/day, you\'ll spend approx. '+fmt(projectedMonth)+' this month.'});}
  var foodSpend=0;fil.forEach(function(e){if(FOOD.indexOf(e.category)!==-1)foodSpend+=e.amount;});
  if(foodSpend>0&&curSpend>0){var foodPct=Math.round((foodSpend/curSpend)*100);if(foodPct>40){remarks.push({type:'bad',icon:'🍽️',title:'High food spending',txt:'Food is '+foodPct+'% ('+fmt(foodSpend)+') of your spending. Try meal prepping!'});}else if(foodPct>0){remarks.push({type:'good',icon:'🍽️',title:'Food spending in check',txt:'Food is '+foodPct+'% of spend ('+fmt(foodSpend)+'). Reasonable!'});}}
  if(remarks.length===0){remarks.push({type:'neutral',icon:'💡',title:'Add more entries',txt:'Add expenses throughout the month to get personalized insights.'});}
  return remarks;
}

  addpin.addEventListener('input',function(e){newPN=e.target.value;});
  var addpbtn=h('button','addpbtn');addpbtn.textContent='+ Add';
  addpbtn.addEventListener('click',function(){if(!newPN.trim())return;savePrt(S.partners.concat([{id:Date.now(),name:newPN.trim(),paid:''}]));newPN='';addpin.value='';rndPartners();});
  var addprow=h('div','addprow');ap(addprow,addpin,addpbtn);
  var pcard=h('div','card');var pslbl=h('div','sec-lbl');pslbl.textContent='Room Partners';ap(pcard,pslbl,plist,addprow);ap(wrap,pcard);
  var splitcard=h('div','splitcard');var ssl=h('div','sec-lbl');ssl.textContent='Split Summary';ap(splitcard,ssl);
  [['Total Room Spend',fmt(rTotal),'var(--txt)'],['Partners Paid',fmt(pPaid),'#0EA5E9'],['Your Net Cost',fmt(Math.max(0,myShare)),'#6366F1']].forEach(function(item){
    var row=h('div','srow');var rl=h('span');rl.style.cssText='font-size:12px;color:var(--mut)';rl.textContent=item[0];
    var rv=h('span');rv.style.cssText='font-size:13px;font-weight:800;color:'+item[2];rv.textContent=item[1];ap(row,rl,rv);ap(splitcard,row);
  });
  if(over>0&&bTotal>0){var oc=h('div','overcard');var ot=h('div');ot.style.cssText='font-weight:800;color:#EF4444;margin-bottom:3px';ot.textContent='Over Budget — Extra Split';var os=h('div');os.style.cssText='font-size:11px;color:var(--mut);margin-bottom:6px';os.textContent=fmt(over)+' / '+nPeople+' people';var oe=h('div');oe.style.cssText='font-size:18px;font-weight:900;color:#EF4444';oe.textContent='Each pays: '+fmt(extra);ap(oc,ot,os,oe);ap(splitcard,oc);}
  if(over<=0&&bTotal>0&&rTotal>0){var okc=h('div','okcard');var okt=h('div');okt.style.cssText='font-weight:800;color:#10B981';okt.textContent='Within budget! 🎉';var oks=h('div');oks.style.cssText='font-size:11px;color:var(--mut);margin-top:3px';oks.textContent='Savings: '+fmt(bTotal-rTotal);ap(okc,okt,oks);ap(splitcard,okc);}
  ap(wrap,splitcard);return wrap;
}

function renderInsights(){
  var wrap=h('div');
  var toprow=h('div');toprow.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px';
  var insTitle=h('div');insTitle.style.cssText='font-size:15px;font-weight:800;color:var(--txt)';insTitle.textContent='📊 Insights';
  var allcsv=h('button','csvbtn');allcsv.style.marginBottom='0';allcsv.textContent='⬇️ All CSV';
  allcsv.addEventListener('click',function(){csvExport(S.expenses,'all');});ap(toprow,insTitle,allcsv);ap(wrap,toprow);
  var snav=h('div','snav');
  ['overview','charts','cohort'].forEach(function(v){
    var btn=h('button','snb'+(S.insv===v?' on':''));btn.textContent={overview:'💡 Overview',charts:'📊 Charts',cohort:'📅 Cohort'}[v];
    btn.addEventListener('click',function(){ss({insv:v});});ap(snav,btn);
  });
  ap(wrap,snav);
  var fil=S.expenses.filter(function(e){var d=new Date(e.date);return d.getMonth()===S.month&&d.getFullYear()===S.year;});
  var r=0,p=0,iv=0;fil.forEach(function(e){if(e.type==='room')r+=e.amount;else if(e.type==='personal')p+=e.amount;else iv+=e.amount;});
  var tots={room:r,personal:p,investment:iv};var tAll=r+p+iv;
  var colorMap={personal:'#6366F1',room:'#0EA5E9',investment:'#10B981'};
  if(S.insv==='overview'){
    var remarks=generateRemarks(S.expenses,S.month,S.year);
    remarks.forEach(function(rm){
      var cls=rm.type==='good'?'remark-good':rm.type==='bad'?'remark-bad':'remark-neutral';
      var rc=h('div',cls);
      var ri=h('div','remark-icon');ri.textContent=rm.icon;
      var rt=h('div','remark-title');rt.style.color=rm.type==='good'?'#10B981':rm.type==='bad'?'#EF4444':'var(--mut)';rt.textContent=rm.title;
      var rtxt=h('div','remark-txt');rtxt.textContent=rm.txt;
      ap(rc,ri,rt,rtxt);ap(wrap,rc);
    });
    if(tAll>0){
      var days=new Date(S.year,S.month+1,0).getDate();var tSpend=r+p;
      var stgrid=h('div','stgrid');
      [['Daily Avg',fmt(Math.round(tSpend/days)),'#6366F1'],['Entries',String(fil.length),'#0EA5E9'],['Invested',fmt(tots.investment),'#10B981']].forEach(function(item){
        var sb=h('div','stbox');var sl2=h('div');sl2.style.cssText='font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);font-weight:600';sl2.textContent=item[0];
        var sv=h('div');sv.style.cssText='font-size:11px;font-weight:800;color:'+item[2]+';margin-top:4px';sv.textContent=item[1];ap(sb,sl2,sv);ap(stgrid,sb);
      });
      ap(wrap,stgrid);
    }
  } else if(S.insv==='charts'){
    if(!tAll){var emp2=h('div','card');emp2.style.cssText='text-align:center;padding:30px;color:var(--mut)';emp2.textContent='📊 No data for this month';ap(wrap,emp2);return wrap;}
    var donutCard=h('div','card');var donutLbl=h('div','sec-lbl');donutLbl.textContent='Spend Breakdown';ap(donutCard,donutLbl);
    var donutSegs=[{color:'#6366F1',value:p,label:'Personal'},{color:'#0EA5E9',value:r,label:'Room'},{color:'#10B981',value:iv,label:'Invest'}];
    var donutWrap=h('div','donut-wrap');
    var dChart=donutChart(donutSegs,110);
    var legend=h('div','donut-legend');
    donutSegs.forEach(function(seg){
      if(seg.value===0)return;
      var li=h('div','legend-item');
      var dot=h('div','legend-dot');dot.style.background=seg.color;
      var ltxt=h('span');ltxt.style.color='var(--txt)';ltxt.textContent=seg.label+': '+fmt(seg.value)+' ('+(tAll>0?Math.round(seg.value/tAll*100):0)+'%)';
      ap(li,dot,ltxt);ap(legend,li);
    });
    ap(donutWrap,dChart,legend);ap(donutCard,donutWrap);ap(wrap,donutCard);
    var cm={};fil.forEach(function(e){if(!cm[e.category])cm[e.category]={total:0,type:e.type};cm[e.category].total+=e.amount;});
    var byCat=Object.keys(cm).map(function(id){return Object.assign({id:id},cm[id],gc(id));}).sort(function(a,b){return b.total-a.total;}).slice(0,6);
    if(byCat.length){
      var catCard=h('div','card');var catLbl=h('div','sec-lbl');catLbl.textContent='Category Breakdown';ap(catCard,catLbl);
      byCat.forEach(function(c){
        var citem=h('div');citem.style.marginBottom='10px';
        var crow=h('div');crow.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:4px';
        var clbl=h('span');clbl.style.fontSize='12px';clbl.textContent=c.i+' '+c.l;
        var camt=h('span');camt.style.cssText='font-size:11px;font-weight:800;color:'+colorMap[c.type];camt.textContent=fmt(c.total);
        ap(crow,clbl,camt);ap(citem,crow,progBar(c.total,byCat[0].total,colorMap[c.type]));ap(catCard,citem);
      });
      ap(wrap,catCard);
    }
    var wm={};fil.forEach(function(e){var wk='W'+Math.ceil(new Date(e.date).getDate()/7);if(!wm[wk])wm[wk]={room:0,personal:0,investment:0};wm[wk][e.type]+=e.amount;});
    var wks=Object.keys(wm).sort();
    if(wks.length){
      var wcard=h('div','card');var wlbl=h('div','sec-lbl');wlbl.textContent='Weekly Spend';ap(wcard,wlbl);
      ap(wcard,simpleBar(wks.map(function(wk){return Object.assign({label:wk},wm[wk]);}),['room','personal','investment'],['#0EA5E9','#6366F1','#10B981'],90));
      var wlegend=h('div');wlegend.style.cssText='display:flex;gap:12px;justify-content:center;margin-top:5px';
      [['room','#0EA5E9'],['personal','#6366F1'],['investment','#10B981']].forEach(function(item){var li=h('div');li.style.cssText='display:flex;align-items:center;gap:5px;font-size:10px;color:'+item[1]+';font-weight:600';var dot=h('div');dot.style.cssText='width:8px;height:8px;border-radius:3px;background:'+item[1];li.textContent=item[0].charAt(0).toUpperCase()+item[0].slice(1);li.insertBefore(dot,li.firstChild);ap(wlegend,li);});
      ap(wcard,wlegend);ap(wrap,wcard);
    }
    var tSpend2=r+p;
    if(tSpend2>0){
      var hicrd=h('div','hicrd');var hisl=h('div','sec-lbl');hisl.textContent='Highest Spend';
      var top=byCat.filter(function(c){return c.type!=='investment';})[0];
      if(top){var hiname=h('div');hiname.style.cssText='font-size:13px;font-weight:800;color:var(--txt)';hiname.textContent=top.i+' '+top.l;var hiamt=h('div');hiamt.style.cssText='font-size:22px;font-weight:900;color:#6366F1;margin:5px 0 3px';hiamt.textContent=fmt(top.total);var hipct=h('div');hipct.style.cssText='font-size:10px;color:var(--mut)';hipct.textContent=Math.round((top.total/tSpend2)*100)+'% of total spend';ap(hicrd,hisl,hiname,hiamt,hipct);ap(wrap,hicrd);}
    }
  } else {
    var cd=[];
    for(var ci=0;ci<6;ci++){
      var dd=new Date(S.year,S.month-(5-ci),1);var mo=dd.getMonth(),yr=dd.getFullYear();
      var ex=S.expenses.filter(function(e){var ed=new Date(e.date);return ed.getMonth()===mo&&ed.getFullYear()===yr;});
      var crow2={label:MO[mo],yr:yr};
      crow2.room=ex.filter(function(e){return e.type==='room';}).reduce(function(a,b){return a+b.amount;},0);
      crow2.personal=ex.filter(function(e){return e.type==='personal';}).reduce(function(a,b){return a+b.amount;},0);
      crow2.investment=ex.filter(function(e){return e.type==='investment';}).reduce(function(a,b){return a+b.amount;},0);
      crow2.total=crow2.room+crow2.personal+crow2.investment;cd.push(crow2);
    }
    var ccard=h('div','card');var csl=h('div','sec-lbl');csl.textContent='6 Month Cohort';ap(ccard,csl);
    ap(ccard,simpleBar(cd,['room','personal','investment'],['#0EA5E9','#6366F1','#10B981'],100));
    var clegend=h('div');clegend.style.cssText='display:flex;gap:12px;justify-content:center;margin-top:5px';
    [['room','#0EA5E9'],['personal','#6366F1'],['investment','#10B981']].forEach(function(item){var li=h('div');li.style.cssText='display:flex;align-items:center;gap:5px;font-size:10px;color:'+item[1]+';font-weight:600';var dot=h('div');dot.style.cssText='width:8px;height:8px;border-radius:3px;background:'+item[1];li.textContent=item[0].charAt(0).toUpperCase()+item[0].slice(1);li.insertBefore(dot,li.firstChild);ap(clegend,li);});
    ap(ccard,clegend);ap(wrap,ccard);
    var tbl=h('div','card');var tsl=h('div','sec-lbl');tsl.textContent='Monthly Table';ap(tbl,tsl);
    var table=h('table');table.style.cssText='width:100%;font-size:11px;border-collapse:collapse';
    var thead=h('thead');var hrow=h('tr');
    [['Month','var(--mut)'],['Room','#0EA5E9'],['Personal','#6366F1'],['Invest','#10B981'],['Total','var(--txt)']].forEach(function(hd,i){var th=h('th');th.style.cssText='padding-bottom:7px;font-weight:700;text-align:'+(i===0?'left':'right')+';color:'+hd[1];th.textContent=hd[0];ap(hrow,th);});
    ap(thead,hrow);ap(table,thead);
    var tbody=h('tbody');
    cd.forEach(function(row,i){
      var isCurr=i===cd.length-1;
      var tr=h('tr');tr.style.cssText='border-top:1px solid var(--bdr);background:'+(isCurr?'rgba(99,102,241,0.05)':'transparent');
      [row.label,row.room>0?fmtShort(row.room):'—',row.personal>0?fmtShort(row.personal):'—',row.investment>0?fmtShort(row.investment):'—',row.total>0?fmtShort(row.total):'—'].forEach(function(v,j){
        var td=h('td');td.style.cssText='padding:7px 0;text-align:'+(j===0?'left':'right')+';color:'+(j===0?(isCurr?'#6366F1':'var(--mut)'):j===4?'var(--txt)':['','#0EA5E9','#6366F1','#10B981'][j])+';font-weight:'+(j===0&&isCurr?700:j===4?800:400);
        td.textContent=v;ap(tr,td);
      });
      ap(tbody,tr);
    });
    ap(table,tbody);ap(tbl,table);ap(wrap,tbl);
    var prev=cd[cd.length-2],curr2=cd[cd.length-1];
    var ps=prev.room+prev.personal,cs=curr2.room+curr2.personal,delta=cs-ps,dpct=ps>0?Math.round((delta/ps)*100):0;
    if(ps>0||cs>0){
      var momcard=h('div');momcard.style.cssText='border-radius:15px;padding:14px;border:1.5px solid;margin-bottom:11px;background:'+(delta>0?'rgba(239,68,68,0.06)':'rgba(16,185,129,0.06)')+';border-color:'+(delta>0?'rgba(239,68,68,0.2)':'rgba(16,185,129,0.2)');
      var moml=h('div','sec-lbl');moml.textContent=prev.label+' → '+curr2.label;
      var mompct=h('div');mompct.style.cssText='font-size:24px;font-weight:900;color:'+(delta>0?'#EF4444':'#10B981');mompct.textContent=(delta>0?'▲':'▼')+' '+Math.abs(dpct)+'%';
      var momtxt=h('div');momtxt.style.cssText='font-size:11px;color:var(--mut);margin-top:3px';momtxt.textContent=delta>0?'Spent '+fmt(delta)+' more than '+prev.label:'Saved '+fmt(Math.abs(delta))+' vs '+prev.label;
      ap(momcard,moml,mompct,momtxt);ap(wrap,momcard);
    }
  }
  return wrap;
}

function render(){
  var app=document.getElementById('app');app.innerHTML='';
  ap(app,renderHeader());
  var main=h('main');
  if(S.tab==='personal')ap(main,renderPersonal());
  else if(S.tab==='room')ap(main,renderRoom());
  else if(S.tab==='investment')ap(main,renderInvest());
  else ap(main,renderInsights());
  ap(app,main);
  ap(app,renderNav());
  var modal=renderModal();if(modal)ap(app,modal);
}
render();
</script>
</body>
</html>
